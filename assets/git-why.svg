<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Why is this line here?</title>
  <desc id="description">git-why traces a source line to the commit message that explains why it changed.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#010409" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="#0d1117"/>
  <path d="M0 0h1280v8H0z" fill="#3fb950"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="64" y="78" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">$ git-why</text>
    <text x="64" y="154" fill="#f0f6fc" font-size="58" font-weight="750">Why is this line here?</text>
    <text x="64" y="197" fill="#8b949e" font-size="25">Ask Git. Get the recorded reason, not a guess.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="238" width="512" height="264" rx="16" fill="url(#panel)" stroke="#30363d"/>
    <rect x="672" y="238" width="544" height="264" rx="16" fill="url(#panel)" stroke="#30363d"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="92" y="280" fill="#8b949e" font-size="22">src/auth.rs</text>
    <path d="M92 300h456" stroke="#30363d"/>
    <text x="92" y="342" fill="#6e7681" font-size="24">1</text>
    <text x="132" y="342" fill="#c9d1d9" font-size="24">fn validate(token: &amp;Token) {</text>
    <rect x="88" y="359" width="460" height="48" rx="8" fill="#1f6feb" fill-opacity="0.18" stroke="#58a6ff"/>
    <text x="100" y="391" fill="#58a6ff" font-size="24">2</text>
    <text x="140" y="391" fill="#f0f6fc" font-size="24">let allowed_skew = 30;</text>
    <rect x="380" y="422" width="168" height="42" rx="21" fill="#d29922" fill-opacity="0.14" stroke="#d29922"/>
    <text x="410" y="450" fill="#e3b341" font-size="21" font-weight="700">why 30?</text>

    <text x="700" y="280" fill="#3fb950" font-size="23">$</text>
    <text x="729" y="280" fill="#f0f6fc" font-size="23">git why src/auth.rs:2</text>
    <path d="M700 300h488" stroke="#30363d"/>
    <text x="700" y="342" fill="#58a6ff" font-size="20" font-weight="700" letter-spacing="1.5">RECORDED REASON</text>
    <text x="700" y="389" fill="#f0f6fc" font-size="30">Accept small clock differences</text>
    <text x="700" y="428" fill="#f0f6fc" font-size="30">between hosts.</text>
    <rect x="700" y="454" width="488" height="30" rx="8" fill="#161b22"/>
    <text x="714" y="476" fill="#8b949e" font-size="18">c11e160e · Fix token clock skew (#42) · Maya Chen</text>
  </g>

  <path d="M602 360h42m-14-14 14 14-14 14" fill="none" stroke="#3fb950" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">
    <rect x="64" y="548" width="134" height="40" rx="20" fill="#238636" fill-opacity="0.2" stroke="#3fb950"/>
    <text x="86" y="574" fill="#7ee787">READ-ONLY</text>
    <rect x="214" y="548" width="176" height="40" rx="20" fill="#1f6feb" fill-opacity="0.18" stroke="#58a6ff"/>
    <text x="237" y="574" fill="#79c0ff">LOCAL HISTORY</text>
    <rect x="406" y="548" width="152" height="40" rx="20" fill="#6e40c9" fill-opacity="0.18" stroke="#a371f7"/>
    <text x="431" y="574" fill="#d2a8ff">NO NETWORK</text>
  </g>
</svg>
